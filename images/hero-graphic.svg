<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1863dc;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0d4db3;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1863dc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a9af5;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background shape -->
  <rect x="20" y="20" width="460" height="460" rx="12" fill="url(#bg)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Decorative lines -->
  <line x1="40" y1="80" x2="460" y2="80" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="40" y1="420" x2="460" y2="420" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Word cloud text — varied sizes and opacities for depth -->
  <text x="50" y="120" fill="rgba(255,255,255,0.45)" font-family="Arial, sans-serif" font-size="18" font-weight="700">PARTNERSHIP</text>
  <text x="250" y="115" fill="rgba(255,255,255,0.35)" font-family="Arial, sans-serif" font-size="14" font-weight="400">ADVANCE</text>
  <text x="370" y="120" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="16" font-weight="700">FUTURE</text>
  <text x="60" y="150" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="13" font-weight="400">PROFESSION</text>
  <text x="210" y="148" fill="rgba(255,255,255,0.25)" font-family="Arial, sans-serif" font-size="11" font-weight="400">WEB</text>
  <text x="280" y="150" fill="rgba(255,255,255,0.28)" font-family="Arial, sans-serif" font-size="12" font-weight="400">MEDICAL</text>
  <text x="390" y="150" fill="rgba(255,255,255,0.22)" font-family="Arial, sans-serif" font-size="11" font-weight="400">GROWTH</text>

  <text x="45" y="200" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="2">BUSINESS</text>
  <text x="350" y="195" fill="rgba(255,255,255,0.35)" font-family="Arial, sans-serif" font-size="16" font-weight="400">SERVICES</text>

  <text x="40" y="260" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="3">SOLUTIONS</text>

  <text x="42" y="310" fill="rgba(255,255,255,0.65)" font-family="Arial, sans-serif" font-size="40" font-weight="700">INNOVATION</text>
  <text x="370" y="305" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="24" font-weight="700">IDEAS</text>

  <text x="50" y="355" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif" font-size="34" font-weight="700">LEADING</text>
  <text x="270" y="350" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="18" font-weight="400">EXPERTISE</text>
  <text x="410" y="355" fill="rgba(255,255,255,0.35)" font-family="Arial, sans-serif" font-size="15" font-weight="400">VISION</text>

  <text x="55" y="390" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="14" font-weight="400">TEAMWORK</text>
  <text x="185" y="388" fill="rgba(255,255,255,0.45)" font-family="Arial, sans-serif" font-size="21" font-weight="700">CONSTRUCTION</text>
  <text x="410" y="390" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="14" font-weight="400">MARKET</text>

  <text x="50" y="418" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="24" font-weight="700">SOFTWARE</text>
  <text x="260" y="418" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="26" font-weight="700">SUCCESS</text>

  <text x="60" y="450" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="16" font-weight="400">DEVELOPMENT</text>
  <text x="260" y="450" fill="rgba(255,255,255,0.28)" font-family="Arial, sans-serif" font-size="14" font-weight="400">HEALTHCARE</text>
  <text x="400" y="450" fill="rgba(255,255,255,0.25)" font-family="Arial, sans-serif" font-size="13" font-weight="400">TRADING</text>

  <!-- Accent bar -->
  <rect x="40" y="468" width="80" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>
</svg>
