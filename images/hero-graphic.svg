<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1863dc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0d4db3;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1863dc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a9af5;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background shape -->
  <rect x="20" y="20" width="460" height="460" rx="12" fill="url(#bg)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Decorative lines -->
  <line x1="40" y1="80" x2="460" y2="80" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="40" y1="420" x2="460" y2="420" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Word cloud text -->
  <text x="50" y="120" fill="rgba(255,255,255,0.12)" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="300">PARTNERSHIP</text>
  <text x="250" y="115" fill="rgba(255,255,255,0.1)" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="300">ADVANCE</text>
  <text x="370" y="120" fill="rgba(255,255,255,0.08)" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="300">FUTURE</text>
  <text x="60" y="150" fill="rgba(255,255,255,0.08)" font-family="Poppins, Arial, sans-serif" font-size="12" font-weight="300">PROFESSION</text>

  <text x="45" y="195" fill="rgba(255,255,255,0.25)" font-family="Poppins, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="2">BUSINESS</text>
  <text x="330" y="185" fill="rgba(255,255,255,0.1)" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="300">MEDICAL</text>

  <text x="40" y="250" fill="rgba(255,255,255,0.45)" font-family="Poppins, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="3">SOLUTIONS</text>

  <text x="42" y="300" fill="rgba(255,255,255,0.35)" font-family="Poppins, Arial, sans-serif" font-size="38" font-weight="600">INNOVATION</text>
  <text x="365" y="295" fill="rgba(255,255,255,0.2)" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="600">IDEAS</text>

  <text x="50" y="345" fill="rgba(255,255,255,0.3)" font-family="Poppins, Arial, sans-serif" font-size="32" font-weight="700">LEADING</text>
  <text x="270" y="340" fill="rgba(255,255,255,0.12)" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="300">EXPERTISE</text>
  <text x="410" y="345" fill="rgba(255,255,255,0.1)" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="300">VISION</text>

  <text x="55" y="380" fill="rgba(255,255,255,0.08)" font-family="Poppins, Arial, sans-serif" font-size="13" font-weight="300">TEAMWORK</text>
  <text x="190" y="378" fill="rgba(255,255,255,0.15)" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="500">CONSTRUCTION</text>
  <text x="415" y="380" fill="rgba(255,255,255,0.1)" font-family="Poppins, Arial, sans-serif" font-size="13" font-weight="300">MARKET</text>

  <text x="50" y="410" fill="rgba(255,255,255,0.18)" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="600">SOFTWARE</text>
  <text x="260" y="408" fill="rgba(255,255,255,0.2)" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="500">SUCCESS</text>

  <text x="80" y="445" fill="rgba(255,255,255,0.08)" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="300">DEVELOPMENT</text>
  <text x="300" y="448" fill="rgba(255,255,255,0.06)" font-family="Poppins, Arial, sans-serif" font-size="12" font-weight="300">HEALTHCARE</text>

  <!-- Accent bar -->
  <rect x="40" y="460" width="80" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
